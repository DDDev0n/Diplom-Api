global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: bank-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: rabbitmq
    static_configs:
      - targets:
          - rabbitmq:15692

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: containers
    static_configs:
      - targets:
          - cadvisor:8080
